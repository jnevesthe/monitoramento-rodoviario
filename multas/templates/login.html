<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset básico */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background-color: #fff;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
            max-width: 90%;
        }

        input {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #bbb;
            font-size: 16px;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border: 1px solid #003366;
            box-shadow: 0 0 5px rgba(0,51,102,0.3);
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #003366;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #00509e;
        }

        .btn.pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,51,102,0.5); }
            70% { box-shadow: 0 0 0 10px rgba(0,51,102,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,51,102,0); }
        }

        @media (max-width: 400px) {
            form {
                width: 100%;
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>

    <form method="POST">
        {% csrf_token %}
        <input name="username" type="text" placeholder="Usuário" required>
        <input name="password" type="password" placeholder="Senha" required>
        <button type="submit" class="btn pulse">Entrar</button>
    </form>

</body>
</html>
