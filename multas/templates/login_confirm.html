<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
    <style>
        :root {
            --primary-color: #003366;
            --danger-color: #cc0000;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #222;
            --border-color: #d1d1d1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .user-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-image-container {
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            padding: 3px;
        }

        .user-placeholder-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            border: 4px solid var(--primary-color);
        }

        .info-group {
            margin-bottom: 25px;
        }

        .full-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            display: block;
            margin-bottom: 5px;
        }

        .username-tag {
            font-size: 1rem;
            color: #666;
            background: #eee;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .btn-logout {
            display: block;
            background-color: var(--danger-color);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-top: 10px;
            border: 1px solid transparent;
        }

        .btn-logout:hover {
            background-color: #990000;
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.2);
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-back:hover {
            text-decoration: underline;
        }

        /* Ajuste Mobile */
        @media (max-width: 480px) {
            .user-card {
                padding: 20px;
            }
            .full-name {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="user-card">
        <div class="profile-image-container">
            {% if request.user.foto %}
                <img src="{{ request.user.foto.url }}" alt="Foto de Perfil" class="profile-img">
            {% else %}
                <div class="user-placeholder-large">
                    {{ request.user.username|slice:":1"|upper }}
                </div>
            {% endif %}
        </div>

        <div class="info-group">
            <span class="full-name">
                {{ request.user.first_name }} {{ request.user.last_name }}
            </span>
            <span class="username-tag">
                @{{ request.user.username }}
            </span>
        </div>

        <a href="{% url 'logout' %}" class="btn-logout">
            Encerrar Sessão
        </a>

        <a href="javascript:history.back()" class="btn-back">
            Voltar para o sistema
        </a>
    </div>

</body>
</html>
